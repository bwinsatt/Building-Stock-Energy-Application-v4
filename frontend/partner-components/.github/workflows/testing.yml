name: Testing

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main
      - bug/**
      - chore/**
      - feature/**

jobs:
  testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
          
      - name: Run tests
        run: npm run test