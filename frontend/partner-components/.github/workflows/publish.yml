name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Backup project .npmrc
        run: |
          if [ -f .npmrc ]; then
            mv .npmrc .npmrc.backup
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@partnerdevops'

      - name: Verify version matches tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_NAME=${GITHUB_REF#refs/tags/}
          EXPECTED_VERSION=${TAG_NAME#v}
          if [ "$PACKAGE_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "Error: package.json version ($PACKAGE_VERSION) does not match tag version ($EXPECTED_VERSION)"
            exit 1
          fi
          echo "✓ Version $PACKAGE_VERSION matches tag $TAG_NAME"

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Publish to GitHub Packages
        run: npm publish --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
